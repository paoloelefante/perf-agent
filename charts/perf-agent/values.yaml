replicaCount: 1

image:
  repository: ghcr.io/paoloelefante/perf-agent
  tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

# Health/metrics server
health:
  port: 8080

# Kubernetes probes
livenessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

# ClusterIP service: exposes health/metrics within the cluster only
service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 64Mi

env:
  - name: HEALTH_ADDR
    value: ":8080"

