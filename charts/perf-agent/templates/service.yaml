apiVersion: v1
kind: Service
metadata:
  name: {{ include "perf-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "perf-agent.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "perf-agent.selectorLabels" . | nindent 4 }}
  ports:
    - name: health
      port: {{ .Values.service.port }}
      targetPort: health
      protocol: TCP
